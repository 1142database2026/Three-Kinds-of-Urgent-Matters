function bearingBetween(lat1,lng1,lat2,lng2){
  const phi1=lat1*Math.PI/180, phi2=lat2*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const y=Math.sin(dLng)*Math.cos(phi2);
  const x=Math.cos(phi1)*Math.sin(phi2)-Math.sin(phi1)*Math.cos(phi2)*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function normalizeDelta(deg){return ((deg+540)%360)-180;}
function formatDistanceKm(km){
  if(km===null || km===undefined || !Number.isFinite(Number(km))) return '';
  const n=Number(km);
  return n<1?`${Math.round(n*1000)} m`:`${n.toFixed(1)} km`;
}
function formatDistanceMeter(m){
  if(m===null || m===undefined || !Number.isFinite(Number(m))) return '';
  const n=Number(m);
  return n<1000?`${Math.round(n)} m`:`${(n/1000).toFixed(1)} km`;
}
function buildDistanceBlock(store){
  const straight=store.distance!==null?formatDistanceKm(store.distance):'';
  const walking=store.walkingDistance!==null&&store.walkingDistance!==undefined?formatDistanceMeter(store.walkingDistance):'';
  if(straight && walking) return `<div class="distance-stack"><span>直線 ${straight}</span><span>步行 約 ${walking}</span></div>`;
  if(straight) return `<span class="distance-badge">直線 ${straight}</span>`;
  return '';
}
async function fetchWalkingRouteForStore(store){
  if(!ORS_API_KEY || ORS_API_KEY.includes('YOUR_API_KEY')) return {...store, walkingDistance:null, routeBearing:null, routeSource:'direct'};

  try{
    const response=await fetch('https://api.openrouteservice.org/v2/directions/foot-walking/geojson',{

        'Content-Type':'application/json; charset=utf-8',
        'Accept':'application/json, application/geo+json'
      },
      body:JSON.stringify({
        coordinates:[[Number(userLng),Number(userLat)],[Number(store.store_longitude),Number(store.store_latitude)]],
        instructions:false
      })
    });

    const feature=json?.features?.[0];
    const coords=feature?.geometry?.coordinates || [];
    const summary=feature?.properties?.summary || {};
    let next=coords.find(c=>Array.isArray(c) && c.length>=2 && calcDistance(Number(userLat),Number(userLng),Number(c[1]),Number(c[0]))>0.008);
    if(!next && coords.length>1) next=coords[1];
    const routeBearing=next?bearingBetween(Number(userLat),Number(userLng),Number(next[1]),Number(next[0])):null;
    return {...store, walkingDistance:Number.isFinite(Number(summary.distance))?Number(summary.distance):null, routeBearing, routeSource:'walking'};
  }catch(err){
    console.warn('步行路徑查詢失敗，改用直線方向',err);
    return {...store, walkingDistance:null, routeBearing:null, routeSource:'direct'};
  }
}
async function enrichRoutes(results){
  if(!locationEnabled || !isValidTaiwanCoordinate(Number(userLat),Number(userLng))) return results;
  const limited=results.map(s=>fetchWalkingRouteForStore(s));
  return Promise.all(limited);
}

function directionText(delta){
  const a=Math.abs(delta);
  if(a<8)return '就在正前方';
  if(delta>0)return `往右轉 ${Math.round(a)}°`;
  return `往左轉 ${Math.round(a)}°`;
}

  document.getElementById('ar-store-sub').textContent=(store.fullAddress||'—') + (Number.isFinite(Number(store.routeBearing))?'｜AR 使用路徑第一段方向':'｜AR 使用直線方向');
  document.getElementById('ar-instruction').textContent='啟動相機中...';

  arTimer=setInterval(updateAROverlay,120);
  updateAROverlay();

function updateAROverlay(){
  if(!arTargetStore)return;
  const storeLat=Number(arTargetStore.store_latitude), storeLng=Number(arTargetStore.store_longitude);
  const directBearing=bearingBetween(Number(userLat),Number(userLng),storeLat,storeLng);
  const targetBearing=Number.isFinite(Number(arTargetStore.routeBearing))?Number(arTargetStore.routeBearing):directBearing;
  const heading=Number.isFinite(Number(userHeading))?Number(userHeading):null;
  const straightDist=calcDistance(Number(userLat),Number(userLng),storeLat,storeLng);
  const straightText=formatDistanceKm(straightDist);
  const walkingText=Number.isFinite(Number(arTargetStore.walkingDistance))?formatDistanceMeter(Number(arTargetStore.walkingDistance)):'';
  const modeText=Number.isFinite(Number(arTargetStore.routeBearing))?'路徑第一段方向':'直線方向';
  if(heading===null){
    document.getElementById('ar-arrow-wrap').style.transform='translate(-50%,-50%)';
    document.getElementById('ar-instruction').textContent='尚未取得手機面向';
    document.getElementById('ar-detail').innerHTML=`${modeText}｜直線 ${straightText}${walkingText?`｜步行約 ${walkingText}`:''}。<span class="ar-warn">請用手機 Safari/Chrome 開啟並允許方向權限。</span>`;
    return;
  }
  const delta=normalizeDelta(targetBearing-heading);
  const clamped=Math.max(-42,Math.min(42,delta/70*42));
  const arrow=document.getElementById('ar-arrow-wrap');
  arrow.style.transform=`translate(-50%,-50%) translateX(${clamped}vw) rotate(${delta}deg)`;
  document.getElementById('ar-instruction').textContent=directionText(delta);
  document.getElementById('ar-detail').textContent=`${modeText}｜直線 ${straightText}${walkingText?`｜步行約 ${walkingText}`:''}｜指向 ${Math.round(targetBearing)}°｜手機 ${Math.round(heading)}°`;
}
function closeARNavigation(){
  document.getElementById('ar-overlay').classList.remove('active');
  if(arTimer){clearInterval(arTimer);arTimer=null;}
  if(arStream){arStream.getTracks().forEach(t=>t.stop());arStream=null;}
  const video=document.getElementById('ar-video');
  if(video)video.srcObject=null;
  arTargetStore=null;
}

function calcDistance(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function isValidTaiwanCoordinate(lat,lng){return Number.isFinite(lat)&&Number.isFinite(lng)&&lat>=21.5&&lat<=26.5&&lng>=119&&lng<=123.5;}
function escapeHtml(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getSelectedServiceNames(){return Array.from(document.querySelectorAll('#service-checkboxes input[type="checkbox"]:checked')).map(cb=>cb.closest('.checkbox-label')?.textContent.trim()).filter(Boolean);}

}


function getHeadingFromEvent(event){
  if(typeof event.webkitCompassHeading === 'number') return event.webkitCompassHeading;
  if(typeof event.alpha === 'number') return (360 - event.alpha + 360) % 360;
  return null;
}
function handleDeviceOrientation(event){
  const heading=getHeadingFromEvent(event);
  if(heading===null||!Number.isFinite(heading))return;
  userHeading=heading;
  orientationEnabled=true;
  updateLocationDebug();
  updateUserHeadingMarker();
}
async function enableOrientationTracking(){
  if(headingWatchStarted)return;
  try{
    if(window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function'){
      const permission=await DeviceOrientationEvent.requestPermission();
      if(permission!=='granted'){
        orientationEnabled=false;
        headingWatchStarted=false;
        return;
      }
    }
    window.removeEventListener('deviceorientationabsolute',handleDeviceOrientation,true);
    window.removeEventListener('deviceorientation',handleDeviceOrientation,true);
    window.addEventListener('deviceorientationabsolute',handleDeviceOrientation,true);
    window.addEventListener('deviceorientation',handleDeviceOrientation,true);
    headingWatchStarted=true;
  }catch(err){
    console.warn('Device orientation unavailable:',err);
    orientationEnabled=false;
    headingWatchStarted=false;
  }
}
function createUserHeadingIcon(){

}

async function toggleLocation(){
  const btn=document.getElementById('location-btn');
  const status=document.getElementById('location-status');
  const debug=document.getElementById('location-debug');

  if(locationEnabled){
    locationEnabled=false;
    userLat=null;
    userLng=null;
    userAccuracy=null;
    userHeading=null;
    orientationEnabled=false;
    locationErrorMessage='';
    userHeadingMarker=null;
    btn.classList.remove('active');
    status.textContent='未啟用';
    updateLocationDebug();
    return;
  }

  if(!navigator.geolocation){
    status.textContent='此裝置不支援定位';
    locationErrorMessage='此裝置或瀏覽器不支援定位功能。';
    updateLocationDebug();
    return;
  }

  if(toggleLocation._requesting){
    return;
  }
  toggleLocation._requesting=true;
  btn.disabled=true;
  status.textContent='取得位置與方向中...';
  locationErrorMessage='';
  debug.className='location-debug';
  debug.innerHTML='正在請求位置與手機方向權限，請依瀏覽器提示允許。';

  try{
    // iPhone/Safari 的方向權限必須在使用者點擊事件中請求；因此和定位按鈕一起處理。
    let orientationTried=false;
    let orientationOk=false;
    try{
      orientationTried=true;
      if(window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function'){
        const permission=await DeviceOrientationEvent.requestPermission();
        if(permission==='granted'){
          headingWatchStarted=false;
          await enableOrientationTracking();
          orientationOk=true;
        }
      }else{
        headingWatchStarted=false;
        await enableOrientationTracking();
        orientationOk=true;
      }
    }catch(err){
      console.warn('方向權限或感測器不可用:',err);
      orientationOk=false;
    }

    const pos=await new Promise((resolve,reject)=>{
      navigator.geolocation.getCurrentPosition(resolve,reject,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
    });

    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    userAccuracy=pos.coords.accuracy??null;
    locationErrorMessage='';
    locationEnabled=true;
    btn.classList.add('active');

    if(orientationOk){
      status.textContent='已取得位置＋方向';
    }else if(orientationTried){
      status.textContent='已定位（未取得方向）';
    }else{
      status.textContent='已取得位置';
    }

    updateLocationDebug();
    if(resultsMapInstance && latestResults.length){
      renderResultsMap(latestResults);
    }
  }catch(err){
    console.error(err);
    locationEnabled=false;
    userLat=null;
    userLng=null;
    userAccuracy=null;
    btn.classList.remove('active');
    status.textContent='定位失敗';
    debug.className='location-debug warn';

    locationErrorMessage='定位失敗。請確認瀏覽器已允許位置權限，或檢查系統定位功能是否開啟。';
    updateLocationDebug();
  }finally{
    toggleLocation._requesting=false;
    btn.disabled=false;
  }
}
function mergeStores(stores){const map=new Map();for(const store of stores){if(!map.has(store.store_id))map.set(store.store_id,{...store,store_service:[...(store.store_service||[])]});else map.get(store.store_id).store_service=map.get(store.store_id).store_service.concat(store.store_service||[]);}return Array.from(map.values()).map(store=>{const seen=new Set(), uniqueServices=[];for(const ss of (store.store_service||[])){if(!seen.has(ss.service_id)){seen.add(ss.service_id);uniqueServices.push(ss);}}return {...store,store_service:uniqueServices};});}
function buildFullAddress(store){
  const raw=(store.store_location||'').trim();
  const nestedCity=(store.town?.city?.city_name||'').trim();
  const nestedTown=(store.town?.town_name||'').trim();
  const mapTown=townMapGlobal.get(String(store.town_id));
  const townName=(nestedTown||mapTown?.town_name||'').trim();
  const cityName=(nestedCity||mapTown?.city_name||'').trim();
  let body=raw;
  if(cityName&&body.startsWith(cityName))body=body.slice(cityName.length);
  if(townName&&body.startsWith(townName))body=body.slice(townName.length);
  return `${cityName}${townName}${body}` || raw || '—';
}
function buildGoogleMapsSearchQuery(store){
  const parts = [
    store.fullAddress || buildFullAddress(store),
    store.brand?.brand_name || '',
    store.store_name || ''
  ].map(v => String(v || '').trim()).filter(Boolean);
  return [...new Set(parts)].join(' ');
}

function buildGoogleMapsSearchUrl(store){
  const query = buildGoogleMapsSearchQuery(store);
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
}

function formatServiceName(name, store){
  const serviceName = String(name || '').trim();
  if(!serviceName) return '';

  const lowerService = serviceName.toLowerCase();
  const brandName = String(store?.brand?.brand_name || '').trim();
  const lowerBrand = brandName.toLowerCase();

  // 行動電源依「超商品牌」顯示對應的行動電源品牌
  if(serviceName.includes('行動電源') || lowerService.includes('chargespot') || lowerService.includes('qiosk')){
    if(brandName.includes('全家') || lowerBrand.includes('family')) return '行動電源-ChargeSPOT';
    if(brandName.includes('7') || brandName.includes('統一') || lowerBrand.includes('seven')) return '行動電源-悠客Qiosk';
    return '行動電源';
  }

  return serviceName;
}

let resultsMapInstance = null;
let resultsMapMarkers = new Map();

function renderResultsMap(results){
  const mapEl = document.getElementById('results-map');
  if(!mapEl) return;
  const validStores = results.filter(s => isValidTaiwanCoordinate(Number(s.store_latitude), Number(s.store_longitude)));
  if(!validStores.length){
    mapEl.innerHTML = '<div style="padding:20px;color:#7a82a0;font-size:13px">目前清單沒有可用座標,無法顯示地圖。</div>';
    return;
  }
  if(typeof L === 'undefined'){
    mapEl.innerHTML = '<div style="padding:20px;color:#f5dc7a;font-size:13px">地圖套件載入失敗,請確認網路連線後重新整理。</div>';
    return;
  }
  if(resultsMapInstance){
    resultsMapInstance.remove();
    resultsMapInstance = null;
  }
  resultsMapMarkers = new Map();
  resultsMapInstance = L.map('results-map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(resultsMapInstance);

  const locateControl = L.control({ position: 'topleft' });
  locateControl.onAdd = function(map) {
    const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-user-locate');
    div.innerHTML = '<a href="#" title="回到我的位置" aria-label="回到我的位置">📍</a>';
    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.on(div, 'click', function(e) {
      L.DomEvent.preventDefault(e);
      focusUserLocation();
    });
    return div;
  };
  locateControl.addTo(resultsMapInstance);

  const bounds = [];
  validStores.forEach((s, index) => {
    const lat = Number(s.store_latitude);
    const lng = Number(s.store_longitude);
    bounds.push([lat, lng]);
    const brand = escapeHtml(s.brand?.brand_name || '—');
    const name = escapeHtml(s.store_name || '—');
    const addr = escapeHtml(s.fullAddress || '—');
    const url = buildGoogleMapsSearchUrl(s);
    const marker = L.marker([lat, lng]).addTo(resultsMapInstance).bindPopup(
      `<div class="map-popup-title">${index + 1}. ${brand} ${name}</div>` +
      `<div class="map-popup-text">${addr}</div>` +
      `<a class="map-popup-link" href="${url}" target="_blank" rel="noopener noreferrer">用 Google Maps 搜尋</a>`
    );
    resultsMapMarkers.set(String(s.store_id), marker);
  });

  // 若使用者已開啟定位,就把目前位置也放進同一張地圖
  if(locationEnabled && isValidTaiwanCoordinate(Number(userLat), Number(userLng))){
    const myLat = Number(userLat);
    const myLng = Number(userLng);
    bounds.push([myLat, myLng]);

    userHeadingMarker = L.marker([myLat, myLng], { icon: createUserHeadingIcon(), zIndexOffset: 1000 }).addTo(resultsMapInstance).bindPopup(
      `<div class="map-popup-title">📍 目前位置</div>` +
      `<div class="map-popup-text">${myLat.toFixed(6)}, ${myLng.toFixed(6)}<br>手機面向:${Number.isFinite(Number(userHeading))?Math.round(userHeading)+'°':'尚未取得'}</div>`
    );

    if(userAccuracy !== null && Number.isFinite(Number(userAccuracy))){
      L.circle([myLat, myLng], {
        radius: Math.min(Number(userAccuracy), 35),
        weight: 1,
        opacity: 0.35,
        fillOpacity: 0.08
      }).addTo(resultsMapInstance);
    }
  }

  if(locationEnabled && isValidTaiwanCoordinate(Number(userLat), Number(userLng))){
    // 使用者定位啟用時,畫面中心固定在使用者目前位置；精準度圓、藍點、三角形頂角都共用同一個 userLat/userLng。
    resultsMapInstance.setView([Number(userLat), Number(userLng)], 17);
  }else if(bounds.length === 1){
    resultsMapInstance.setView(bounds[0], 16);
  }else{
    resultsMapInstance.fitBounds(bounds, { padding: [28, 28] });
  }
}

async function fetchAllStores(queryBuilder,pageSize=1000){let from=0, allRows=[];while(true){const {data,error}=await queryBuilder.range(from,from+pageSize-1);if(error)throw error;if(!data||!data.length)break;allRows=allRows.concat(data);if(data.length<pageSize)break;from+=pageSize;}return allRows;}
async function search(){const serviceIds=getSelectedServices();const brandId=document.getElementById('brand-select').value;const limitCount=parseInt(document.getElementById('limit-select').value,10);if(!serviceIds.length){alert('請至少勾選一個服務項目');return;}renderState('⏳','<span class="loading-dots">查詢中</span>');let query=client.from('store').select(`
  store_id, store_name, store_location, store_latitude, store_longitude, town_id, brand_id,
  brand:brand_id ( brand_id, brand_name ),
  town:town_id ( town_name, city:city_id ( city_name ) ),
  store_service!inner ( service_id, service:service_id ( service_id, service_name ) )
`).in('store_service.service_id',serviceIds);if(brandId)query=query.eq('brand_id',parseInt(brandId,10));let rawStores;try{rawStores=await fetchAllStores(query,1000);}catch(error){console.error(error);renderState('⚠️','查詢失敗,請檢查資料表關聯或稍後再試',true);return;}if(!rawStores||!rawStores.length){renderState('😕','查無符合的門市');return;}
let stores = mergeStores(rawStores);

// 必須同時擁有所有勾選服務
stores = stores.filter(store => {
  const ownedIds = (store.store_service || []).map(s => s.service_id);
  return serviceIds.every(id => ownedIds.includes(id));
});

if(!stores.length){renderState('😕','查無符合的門市');return;}let results=stores.map(store=>{const sortCoord=getSortCoordinate(store);const distance=(locationEnabled&&userLat!==null&&userLng!==null&&sortCoord.valid)?calcDistance(userLat,userLng,sortCoord.lat,sortCoord.lng):null;return {...store,distance,sortLat:sortCoord.lat,sortLng:sortCoord.lng,fullAddress:buildFullAddress(store),validCoord:sortCoord.valid};});if(locationEnabled&&userLat!==null&&userLng!==null){results.sort((a,b)=>{if(a.distance===null&&b.distance===null)return a.store_id-b.store_id;if(a.distance===null)return 1;if(b.distance===null)return -1;if(a.distance!==b.distance)return a.distance-b.distance;return a.store_id-b.store_id;});}else{results.sort((a,b)=>{if(a.brand_id!==b.brand_id)return a.brand_id-b.brand_id;return a.store_id-b.store_id;});}results = results.slice(0, limitCount);
if(locationEnabled&&userLat!==null&&userLng!==null){
  renderState('⏳','<span class="loading-dots">查詢路徑距離中</span>');
  results=await enrichRoutes(results);
}
latestResults=results;const selectedNames=getSelectedServiceNames();const logicText=selectedNames.length>1?`已套用交集條件:${selectedNames.join('＋')} 全部都要有`:selectedNames.length===1?`已套用條件:需要 ${selectedNames[0]}`:'';const mapBox=renderMapBox(results);document.getElementById('results-area').innerHTML=`<div class="results-header"><span class="results-count">找到 <strong>${results.length}</strong> 間門市</span>${logicText?`<span style="font-size:12px;color:var(--accent2)">${escapeHtml(logicText)}</span>`:''}${locationEnabled?`<span style="font-size:12px;color:var(--accent2)">📍 依距離排序</span>`:''}</div>${mapBox}${results.map((s,i)=>{const serviceNames=[...new Set((s.store_service||[]).map(ss=>formatServiceName(ss.service?.service_name,s)).filter(Boolean))];const mapsUrl=buildGoogleMapsSearchUrl(s);const distanceBlock=buildDistanceBlock(s);return `<div class="store-card" data-store-id="${escapeHtml(s.store_id)}" onclick="focusStoreOnMap('${escapeHtml(s.store_id)}')" style="animation-delay:${i*0.04}s"><div class="store-info"><div class="store-top"><span class="brand-badge">${escapeHtml(s.brand?.brand_name||'—')}</span><span class="store-name">${escapeHtml(s.store_name||'—')}</span></div><div class="store-address">📍 ${escapeHtml(s.fullAddress||'—')}</div><div class="services">${serviceNames.length?serviceNames.map(name=>`<span class="service-tag">${escapeHtml(name)}</span>`).join(''):'<span class="service-tag">無服務標籤</span>'}</div></div><div class="store-right">${distanceBlock}<button class="ar-btn" onclick="event.stopPropagation(); openARByStoreId('${escapeHtml(s.store_id)}')">📷 AR 指路</button><a class="nav-btn" href="${mapsUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">🗺 Google Maps</a></div></div>`;}).join('')}`;setTimeout(()=>renderResultsMap(results),0);}
Promise.all([loadServices(),loadBrands(),loadAreaData()]).then(()=>{updateLocationDebug();updateServiceLogicHint();});
</script>
